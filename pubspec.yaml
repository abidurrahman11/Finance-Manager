name: finance_manager
description: Finance Manager - Track expenses, income, bills and budgets
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP & Networking
  dio: ^5.4.3+1

  # Local Storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.4

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
